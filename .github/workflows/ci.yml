name: CI

# Lint + test on every push to main and every pull request.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    # Windows matches FYPA's target platform and the platform the golden
    # regression files were generated on (Triangle meshing is deterministic
    # across machines; MKL PARDISO results can vary slightly by MKL version,
    # so if the Sandbox regression test ever mismatches here, regenerate the
    # golden — see tests/test_regression.py).
    runs-on: windows-latest

    steps:
      - name: Checkout (with the altium_monkey submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
          python -m pip install -e altium_monkey

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest — fast suite)
        # The 'slow' end-to-end regression runs on the large Imperial /
        # Methuselah designs are excluded here; run them locally with
        # `pytest -m slow` (a few minutes each).
        run: pytest -m "not slow"
